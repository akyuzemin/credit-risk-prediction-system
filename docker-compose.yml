version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credit-risk-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app

  frontend:
    build:
      context: ./creditview-dashboard
      dockerfile: Dockerfile
    container_name: credit-risk-frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./creditview-dashboard:/app
      - /app/node_modules