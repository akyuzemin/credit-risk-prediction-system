seed: 42
test_size: 0.2

data:
  raw_source_path: data/raw/german.data.csv
  prepared_csv_path: data/raw/credit_risk.csv
  target_col: default

model:
  logistic_regression:
    C: 1.0
    max_iter: 1200
    class_weight: balanced
    solver: lbfgs
  random_forest:
    n_estimators: 300
    max_depth: 10
    min_samples_leaf: 2
    class_weight: balanced
    random_state: 42

training:
  candidate_models:
    - logistic_regression
    - random_forest

threshold:
  default: 0.50
